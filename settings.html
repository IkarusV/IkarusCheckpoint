<div class="ikcp-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Ikarus Checkpoint</b>
            <div class="inline-drawer-icon fa-solid fa-circle-down down"></div>
        </div>
        <div class="inline-drawer-content" style="padding-top:10px;">
            <div class="flex-container flexFlowColumn gap-1">

                <div class="ikcp-settings-section">
                    <label class="checkbox_label">
                        <input id="ikcp-enabled" type="checkbox" />
                        <span>Enable Ikarus Checkpoint</span>
                    </label>
                </div>

                <div class="ikcp-settings-section" style="margin-top:8px">
                    <label class="checkbox_label">
                        <input id="ikcp-show-dock" type="checkbox" />
                        <span>Show floating dock icon</span>
                    </label>
                    <small style="display:block; margin-top:4px; color:#888; font-size:11px;">
                        When disabled, use the wand menu or keyboard shortcut to open.
                    </small>
                </div>

                <div class="ikcp-settings-section" style="margin-top:8px">
                    <label class="checkbox_label">
                        <input id="ikcp-show-notifs" type="checkbox" />
                        <span>Show scan notifications</span>
                    </label>
                    <small style="display:block; margin-top:4px; color:#888; font-size:11px;">
                        Toast popups when scanning starts and finishes. Errors always show.
                    </small>
                </div>



                <div style="margin-top:10px">
                    <button id="ikcp-open-window" class="menu_button interactable" style="width:100%">
                        <i class="fa-solid fa-bookmark"></i> Open Checkpoint Navigator
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
